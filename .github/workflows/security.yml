name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Caller must explicitly grant the permissions the reusable workflow requests.
# Some org/repo defaults set GITHUB_TOKEN to read-only or none.
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  security:
    # Reusable workflow của sast-action library. Pin theo tag khi v0.2.0 release.
    uses: cochecheee/sast-action/.github/workflows/sast-ci.yml@master
    with:
      language: python
      pipeline_status: passed
      # V2.2 CD: build Docker image, push to Hub, trigger Render staging.
      # Set false để disable CD nếu chưa setup Docker Hub + Render hook.
      deploy: true
      image_repo: tienbui482/sample-python
      dockerfile: Dockerfile
      build_context: .
    secrets:
      dashboard_url:      ${{ secrets.MCP_GATEWAY_URL }}
      dashboard_token:    ${{ secrets.MCP_WEBHOOK_TOKEN }}
      docker_username:    ${{ secrets.DOCKER_USERNAME }}
      docker_password:    ${{ secrets.DOCKER_PASSWORD }}
      render_deploy_hook: ${{ secrets.RENDER_DEPLOY_HOOK }}
