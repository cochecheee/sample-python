name: Security

on:
  push:
    branches: [main, develop, verify-work-test]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Caller must explicitly grant the permissions the reusable workflow requests.
# Some org/repo defaults set GITHUB_TOKEN to read-only or none.
permissions:
  contents: read
  security-events: write
  actions: read
  # V2.3 — OWASP ZAP action wants issues:write to optionally file alerts
  # (we set allow_issue_writing=false but the action still requires the
  # permission to be present, otherwise the job fails startup validation).
  issues: write

jobs:
  security:
    # Reusable workflow của sast-action library. Pin theo tag khi v0.2.0 release.
    # V2.7 verify — switch from @master to @verify-work to test Security Gate + CodeQL.
    # Revert sau khi smoke pass.
    uses: cochecheee/sast-action/.github/workflows/sast-ci.yml@verify-work
    with:
      language: python
      pipeline_status: passed
      # V2.2 CD: build Docker image, push to Hub, trigger Render staging.
      # Disabled trong test branch để giảm thời gian + tránh deploy staging
      # bằng build chưa verify gate.
      deploy: false
      image_repo: tienbui482/sample-python
      dockerfile: Dockerfile
      build_context: .
      # V2.3 — DAST tắt cùng để smoke ngắn (~5 phút SAST + gate là đủ)
      dast: false
      staging_url: https://sample-python-latest.onrender.com
      dast_scan_type: baseline
      # V2.7 — Security Gate. Sample-python có vuln cố ý → expect FAIL.
      gate_enabled: true
      gate_fail_on_critical: 1
      gate_fail_on_high: 3
    secrets:
      dashboard_url:      ${{ secrets.MCP_GATEWAY_URL }}
      dashboard_token:    ${{ secrets.MCP_WEBHOOK_TOKEN }}
      docker_username:    ${{ secrets.DOCKER_USERNAME }}
      docker_password:    ${{ secrets.DOCKER_PASSWORD }}
      render_deploy_hook: ${{ secrets.RENDER_DEPLOY_HOOK }}
