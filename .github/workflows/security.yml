name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Caller must explicitly grant the permissions the reusable workflow requests.
# Some org/repo defaults set GITHUB_TOKEN to read-only or none.
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  security:
    # Reusable workflow của sast-action library. Pin theo tag khi v0.2.0 release.
    uses: cochecheee/sast-action/.github/workflows/sast-ci.yml@master
    with:
      language: python
      pipeline_status: passed
    secrets:
      dashboard_url:   ${{ secrets.MCP_GATEWAY_URL }}
      dashboard_token: ${{ secrets.MCP_WEBHOOK_TOKEN }}
